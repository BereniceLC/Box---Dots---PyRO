apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: boxdots-python:latest
          imagePullPolicy: Never
          workingDir: /app/backend
          command: ["python", "-u", "app.py"]
          env:
            - name: APP_PYRO_NS_HOST
              value: "pyro-ns"
            - name: APP_PYRO_NS_PORT
              value: "9090"
            - name: MONGO_URI
              value: "mongodb://mongo:27017"
            - name: MONGO_DB
              value: "boxdots_pyro"
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050